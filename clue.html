.corner-icon {
  position: absolute;
  width: 90px;
  height: 90px;
  opacity: 0.18;
  color: #c084fc;
  filter: drop-shadow(0 0 4px rgba(192, 132, 252, 0.08));
  transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
  pointer-events: none;
  overflow: hidden;
}

.corner-icon svg {
  width: 100%;
  height: 100%;
  max-width: 100%;
  max-height: 100%;
  display: block;
  stroke: currentColor;
}

.corner-icon.active {
  opacity: 0.42;
  filter: drop-shadow(0 0 14px rgba(192, 132, 252, 0.35));
  transform: scale(1.08);
}

.top-left {
  top: 24px;
  left: 24px;
}

.center-wrap {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  box-sizing: border-box;
}

.panel {
  max-width: 700px;
  width: 100%;
  text-align: center;
  padding: 40px 24px;
  background: rgba(10, 0, 20, 0.70);
  border: 1px solid rgba(192, 132, 252, 0.18);
  box-shadow: 0 0 22px rgba(192, 132, 252, 0.08);
}

.title {
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.text {
  font-size: clamp(1rem, 2vw, 1.2rem);
  line-height: 1.8;
  opacity: 0.9;
  margin-bottom: 34px;
}

.continue {
  display: inline-block;
  padding: 12px 22px;
  border: 1px solid rgba(192, 132, 252, 0.5);
  color: #c084fc;
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

.continue:hover {
  background: rgba(192, 132, 252, 0.08);
  box-shadow: 0 0 14px rgba(192, 132, 252, 0.18);
  transform: translateY(-1px);
}

@media (max-width: 600px) {
  .corner-icon {
    width: 62px;
    height: 62px;
  }

  .top-left {
    top: 16px;
    left: 16px;
  }

  .panel {
    padding: 32px 18px;
  }
}
