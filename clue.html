.frame {
  position: relative;
  width: min(900px, 100%);
  border: 2px solid rgba(192, 132, 252, 0.55);
  box-shadow: 0 0 24px rgba(192, 132, 252, 0.10);
  padding: 72px 40px 48px;
  box-sizing: border-box;
  text-align: center;
  background: rgba(10, 0, 20, 0.78);
  overflow: hidden;
}

.corner {
  position: absolute;
  width: 72px;
  height: 72px;
  opacity: 0.95;
  pointer-events: none;
  filter: drop-shadow(0 0 5px rgba(192, 132, 252, 0.35));
}

.corner.tl {
  top: -2px;
  left: -2px;
  transform: none;
}

.corner.tr {
  top: -2px;
  right: -2px;
  transform: scaleX(-1);
}

.corner.bl {
  bottom: -2px;
  left: -2px;
  transform: scaleY(-1);
}

.corner.br {
  bottom: -2px;
  right: -2px;
  transform: scaleX(-1) scaleY(-1);
}

.inner {
  max-width: 700px;
  margin: 0 auto;
}

.title {
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
  text-shadow: 0 0 10px rgba(192, 132, 252, 0.25);
}

.text {
  font-size: clamp(1rem, 2vw, 1.2rem);
  line-height: 1.8;
  opacity: 0.9;
  margin-bottom: 34px;
}

.icon-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(50px, 1fr));
  gap: 20px;
  align-items: center;
  justify-items: center;
  margin-bottom: 34px;
}

.icon {
  width: 42px;
  height: 42px;
  opacity: 0.88;
  filter: drop-shadow(0 0 6px rgba(192, 132, 252, 0.20));
}

.continue {
  display: inline-block;
  padding: 12px 22px;
  border: 1px solid rgba(192, 132, 252, 0.5);
  color: #c084fc;
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

.continue:hover {
  background: rgba(192, 132, 252, 0.08);
  box-shadow: 0 0 14px rgba(192, 132, 252, 0.18);
  transform: translateY(-1px);
}

@media (max-width: 600px) {
  .frame {
    padding: 64px 20px 36px;
  }

  .corner {
    width: 54px;
    height: 54px;
  }

  .icon-row {
    gap: 14px;
  }

  .icon {
    width: 34px;
    height: 34px;
  }
}
