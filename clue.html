<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clue</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #05000a;
      color: #c084fc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .wrap {
      max-width: 700px;
      width: 100%;
      padding: 40px 24px;
      background: rgba(10, 0, 20, 0.70);
      border: 1px solid rgba(192, 132, 252, 0.18);
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.08);
      box-sizing: border-box;
    }

    .title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .text {
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 34px;
    }

    .icon-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 34px;
      align-items: center;
      justify-items: center;
    }

    .icon {
      width: 42px;
      height: 42px;
      opacity: 0.18;
      transition: opacity 1.2s ease, filter 1.2s ease, transform 1.2s ease;
      filter: drop-shadow(0 0 4px rgba(192, 132, 252, 0.08));
    }

    .icon.active {
      opacity: 0.42;
      filter: drop-shadow(0 0 14px rgba(192, 132, 252, 0.35));
      transform: scale(1.08);
    }

    /* === BUTTON SYSTEM (FIXED) === */

    .actions {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.action-btn {
  display: inline-block;
  padding: 12px 22px;
  border: 1px solid rgba(192, 132, 252, 0.5);
  color: #c084fc;
  text-decoration: none;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  user-select: none;
}

.action-btn:hover {
  background: rgba(192, 132, 252, 0.08);
  box-shadow: 0 0 14px rgba(192, 132, 252, 0.18);
  transform: translateY(-1px);
}

    .action-btn.secondary {
      opacity: 0.65;
      border-color: rgba(192, 132, 252, 0.3);
    }

    .action-btn.secondary:hover {
      opacity: 1;
      border-color: rgba(192, 132, 252, 0.5);
    }

    @media (max-width: 600px) {
      .icon {
        width: 34px;
        height: 34px;
      }

      .icon-row {
        gap: 16px;
      }

      .wrap {
        padding: 32px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="title">Clue</div>

    <div class="text">
      Not everything reveals itself at once.
      Some things only appear in the order they expect to be noticed.
    </div>

    <div class="icon-row">
      <img src="images/eye.svg" class="icon" id="icon1" alt="Eye">
      <img src="images/fire.svg" class="icon" id="icon2" alt="Fire">
      <img src="images/puzzle.svg" class="icon" id="icon3" alt="Puzzle">
      <img src="images/star.svg" class="icon" id="icon4" alt="Star">
    </div>

    <div class="actions">
  <a href="minigame.html" class="action-btn">Continue</a>
  <a href="index.html" class="action-btn">Back to Start</a>
</div>

  <script>
    const icons = [
      document.getElementById("icon1"),
      document.getElementById("icon2"),
      document.getElementById("icon3"),
      document.getElementById("icon4")
    ];

    const glowDuration = 2500;
    const gapBetween = 1200;
    const cyclePause = 20000;
    const initialDelay = 10000;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runCycle() {
      await sleep(initialDelay);

      while (true) {
        for (let i = 0; i < icons.length; i++) {
          icons[i].classList.add("active");
          await sleep(glowDuration);

          icons[i].classList.remove("active");
          await sleep(gapBetween);
        }

        await sleep(cyclePause);
      }
    }

    runCycle();

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
