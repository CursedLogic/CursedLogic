<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WNP94WVB22"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WNP94WVB22');

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You asked.</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0;
        min-height: 100vh;
        background-color: #1e1e1e;
        color: #e0e0e0;
        padding: 20px;
        text-align: center;
        transition: background-color 0.45s ease, color 0.45s ease;
      }

      body.cursed-state {
        background-color: #0a0014;
        color: #c084fc;
      }

      .content {
        max-width: 600px;
        width: 90%;
        font-size: 1.2rem;
        line-height: 1.6;
      }

      .char-seed {
        transition: color 0.25s ease, text-shadow 0.25s ease;
      }

      .char-seed.target {
        color: #ff5c7a;
        text-shadow:
          0 0 5px rgba(255, 92, 122, 0.55),
          0 0 12px rgba(255, 92, 122, 0.3);
      }

      .decode-wrap {
        margin-top: 28px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.45s ease, transform 0.45s ease;
      }

      .decode-wrap.show {
        opacity: 1;
        transform: translateY(0);
      }

      .decode-line {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
      }

      .decode-slot {
        min-width: 0.85em;
        border-bottom: 1px solid rgba(192, 132, 252, 0.35);
        color: rgba(224, 224, 224, 0.45);
        transition: color 0.25s ease;
      }

      .decode-slot.filled {
        color: #ff5c7a;
      }

      button {
        margin-top: 30px;
        padding: 10px 20px;
        background-color: #333;
        color: white;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="content" id="message-area">
      <p><strong>You asked why I'm quiet.</strong></p>
      <p>I speak when I have something to say.<br>Not before. Not for show.</p>
      <p>I keep to myself. That’s how I work.<br>It’s not a phase.</p>
      <p>This isn’t a bit.</p>
      <p>If I seem quiet, I’m just waiting.</p>

      <p>
        You asked<span id="hidden-dot">.</span>
        This is the answer.
      </p>

      <div class="decode-wrap" id="decode-wrap">
        <div class="decode-line" id="decode-line"></div>
      </div>

      <button id="understood-btn">Understood</button>
    </div>

    <script>
      (() => {
        const secretPhrase = "Cursed is watching";
        const glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";

        let konamiActive = false;
        let understoodClicked = false;

        const messageArea = document.getElementById("message-area");
        const decodeWrap = document.getElementById("decode-wrap");
        const decodeLine = document.getElementById("decode-line");

        function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
        function randomChar(){ return glitchChars[Math.floor(Math.random()*glitchChars.length)]; }

        function wrapText(){
          const walker = document.createTreeWalker(messageArea, NodeFilter.SHOW_TEXT);
          let node;
          while(node = walker.nextNode()){
            const frag = document.createDocumentFragment();
            for(const ch of node.nodeValue){
              const span = document.createElement("span");
              span.className = "char-seed";
              span.textContent = ch;
              span.dataset.original = ch;
              frag.appendChild(span);
            }
            node.parentNode.replaceChild(frag,node);
          }
        }

        wrapText();

        function buildDecode(){
          for(const ch of secretPhrase){
            if(ch===" "){
              const s=document.createElement("span");
              s.className="decode-space";
              decodeLine.appendChild(s);
            } else {
              const slot=document.createElement("span");
              slot.className="decode-slot";
              slot.textContent="_";
              decodeLine.appendChild(slot);
            }
          }
        }

        buildDecode();

        const slots = document.querySelectorAll(".decode-slot");
        const chars = document.querySelectorAll(".char-seed");

        async function reveal(){
          document.body.classList.add("cursed-state");
          decodeWrap.classList.add("show");

          let slotIndex=0;

          for(const letter of secretPhrase){
            if(letter===" "){
              await sleep(400);
              continue;
            }

            // find next matching character in text
            let target;
            for(const c of chars){
              if(!c.classList.contains("used") && c.textContent.toLowerCase()===letter){
                target=c;
                break;
              }
            }

            if(!target) continue;
            target.classList.add("used");

            // slow glitch phase
            for(let i=0;i<12;i++){
              target.textContent = randomChar();
              await sleep(180);
            }

            target.textContent = target.dataset.original;
            target.classList.add("target");

            // fill decode slot
            const slot = slots[slotIndex++];
            if(slot){
              slot.textContent = letter;
              slot.classList.add("filled");
            }

            await sleep(450);
          }
        }

        function activate(){
          if(understoodClicked){
            window.location.href="/kafka.html";
            return;
          }

          if(konamiActive) return;
          konamiActive=true;
          reveal();
        }

        document.addEventListener("keydown",(e)=>{
          if(e.key==="."){
            if(konamiActive){
              window.location.href="/clue.html";
            } else {
              window.location.href="/friends/friends.html";
            }
          }
        });

        // simple Konami detection
        const code=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
        let index=0;

        document.addEventListener("keydown",(e)=>{
          if(e.key===code[index]){
            index++;
            if(index===code.length){
              activate();
              index=0;
            }
          } else {
            index=0;
          }
        });

        document.getElementById("understood-btn").onclick = function(){
          understoodClicked=true;
          this.innerText="Great";
          this.style.opacity="0";
        };
      })();
    </script>
  </body>
</html>
