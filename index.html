<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>You asked.</title>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1e1e1e;
      color: #e0e0e0;
      text-align: center;
      padding: 20px;
      transition: background 0.5s ease, color 0.5s ease;
    }

    body.cursed {
      background: #0a0014;
      color: #c084fc;
    }

    .content {
      max-width: 600px;
      line-height: 1.6;
      font-size: 1.2rem;
    }

    .target {
      color: #ff5c7a;
      text-shadow: 0 0 6px rgba(255, 92, 122, 0.5);
    }

    .decode {
      margin-top: 30px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .decode.show {
      opacity: 1;
    }

    .slot {
      display: inline-block;
      min-width: 12px;
      border-bottom: 1px solid #aaa;
      margin: 2px;
    }

    .slot.filled {
      color: #ff5c7a;
      border-color: #ff5c7a;
    }
  </style>
</head>

<body>

<div class="content" id="content">

  <p><strong>You asked why I'm quiet.</strong></p>

  <p>
    I speak when I have something to say.<br>
    Not before. Not for show.
  </p>

  <p>
    I keep to myself. That’s how I work.<br>
    It’s not a phase.
  </p>

  <p>This isn’t a bit.</p>

  <p>If I seem quiet, I’m just waiting.</p>

  <p>
    You asked<span id="dot">.</span> This is the answer.
  </p>

  <div class="decode" id="decode"></div>

</div>

<script>
(() => {

const phrase = "cursed is watching";
const glitchChars = "!@#$%^&*ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let konamiActive = false;
let understoodClicked = false;

// ----------------------
// FIXED ARROW KEYS BLOCK
// ----------------------
document.addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
    e.preventDefault();
  }
});

// ----------------------
// PERIOD LOGIC
// ----------------------
document.addEventListener("keydown", e => {
  if (e.key === ".") {
    if (konamiActive) location.href = "/clue.html";
    else location.href = "/friends/friends.html";
  }
});

// ----------------------
// KONAMI
// ----------------------
const code = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a"];
let index = 0;

document.addEventListener("keydown", e => {
  if (e.key === code[index]) {
    index++;
    if (index === code.length) {
      activate();
      index = 0;
    }
  } else {
    index = 0;
  }
});

// ----------------------
// CORE FIX: TARGET ONLY REAL LETTERS
// ----------------------
function findTargets() {

  const walker = document.createTreeWalker(
    document.getElementById("content"),
    NodeFilter.SHOW_TEXT
  );

  const matches = [];
  const chars = [];

  let node;
  while (node = walker.nextNode()) {
    if (!node.nodeValue.trim()) continue;

    for (let i = 0; i < node.nodeValue.length; i++) {
      chars.push({node, index:i, char: node.nodeValue[i].toLowerCase()});
    }
  }

  let pointer = 0;

  for (let letter of phrase) {

    if (letter === " ") {
      matches.push(null);
      continue;
    }

    for (let i = pointer; i < chars.length; i++) {
      if (chars[i].char === letter) {

        matches.push(chars[i]);
        pointer = i + 1;
        break;
      }
    }
  }

  return matches;
}

// ----------------------
// APPLY TARGETS (ONLY MODIFY THOSE LETTERS)
// ----------------------
function applyTargets(matches) {

  const grouped = new Map();

  matches.forEach(m => {
    if (!m) return;

    if (!grouped.has(m.node)) grouped.set(m.node, []);
    grouped.get(m.node).push(m.index);
  });

  const spans = [];

  grouped.forEach((indexes, node) => {

    const text = node.nodeValue;
    const frag = document.createDocumentFragment();

    let last = 0;

    indexes.sort((a,b)=>a-b);

    indexes.forEach(i => {

      frag.appendChild(document.createTextNode(text.slice(last, i)));

      const span = document.createElement("span");
      span.textContent = text[i];
      frag.appendChild(span);

      spans.push(span);
      last = i + 1;
    });

    frag.appendChild(document.createTextNode(text.slice(last)));

    node.parentNode.replaceChild(frag, node);
  });

  return spans;
}

// ----------------------
// DECODE LINE
// ----------------------
function buildDecode() {

  const container = document.getElementById("decode");
  const slots = [];

  phrase.split("").forEach(c => {
    if (c === " ") {
      container.appendChild(document.createTextNode(" "));
      slots.push(null);
    } else {
      const s = document.createElement("span");
      s.className = "slot";
      s.textContent = "_";
      container.appendChild(s);
      slots.push(s);
    }
  });

  return slots;
}

// ----------------------
// GLITCH
// ----------------------
function randomChar() {
  return glitchChars[Math.floor(Math.random()*glitchChars.length)];
}

function sleep(ms) {
  return new Promise(r=>setTimeout(r,ms));
}

async function glitch(span) {
  for (let i = 0; i < 12; i++) {
    span.textContent = randomChar();
    await sleep(180);
  }
}

// ----------------------
// ACTIVATE
// ----------------------
async function activate() {

  if (understoodClicked) {
    location.href = "/kafka.html";
    return;
  }

  if (konamiActive) return;
  konamiActive = true;

  document.body.classList.add("cursed");

  const matches = findTargets();
  const spans = applyTargets(matches);
  const slots = buildDecode();

  document.getElementById("decode").classList.add("show");

  let spanIndex = 0;

  for (let i = 0; i < phrase.length; i++) {

    if (phrase[i] === " ") {
      await sleep(400);
      continue;
    }

    const span = spans[spanIndex++];

    await glitch(span);

    span.classList.add("target");

    const slot = slots[i];
    if (slot) {
      slot.textContent = phrase[i];
      slot.classList.add("filled");
    }

    await sleep(450);
  }
}

})();
</script>

</body>
</html>
