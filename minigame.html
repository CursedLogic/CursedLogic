.wrap {
  max-width: 720px;
  width: 100%;
  padding: 40px 24px;
  background: rgba(10, 0, 20, 0.70);
  border: 1px solid rgba(192, 132, 252, 0.18);
  box-shadow: 0 0 22px rgba(192, 132, 252, 0.08);
  box-sizing: border-box;
}

.title {
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 18px;
}

.text {
  font-size: clamp(1rem, 2vw, 1.15rem);
  line-height: 1.8;
  opacity: 0.9;
  margin-bottom: 30px;
}

.icon-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  margin-bottom: 28px;
  align-items: center;
  justify-items: center;
}

.icon-button {
  background: transparent;
  border: 1px solid rgba(192, 132, 252, 0.18);
  padding: 14px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
  opacity: 0.9;
}

.icon-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 14px rgba(192, 132, 252, 0.16);
  border-color: rgba(192, 132, 252, 0.45);
}

.icon-button img {
  width: 42px;
  height: 42px;
  display: block;
  pointer-events: none;
}

.icon-button.correct {
  border-color: rgba(120, 255, 160, 0.65);
  box-shadow: 0 0 14px rgba(120, 255, 160, 0.18);
  opacity: 0.75;
}

.icon-button.wrong {
  border-color: rgba(255, 120, 120, 0.65);
  box-shadow: 0 0 14px rgba(255, 120, 120, 0.18);
}

.status {
  min-height: 28px;
  font-size: 1rem;
  letter-spacing: 0.04em;
  opacity: 0.9;
}

@media (max-width: 600px) {
  .wrap {
    padding: 32px 18px;
  }

  .icon-row {
    gap: 14px;
  }

  .icon-button {
    padding: 10px;
  }

  .icon-button img {
    width: 34px;
    height: 34px;
  }
}

```

  </div>

  <script>
    const correctSequence = ["eye", "fire", "puzzle", "star"];
    let currentStep = 0;
    let locked = false;

    const buttons = document.querySelectorAll(".icon-button");
    const status = document.getElementById("status");

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        if (locked) return;

        const chosen = button.dataset.symbol;
        const expected = correctSequence[currentStep];

        if (chosen === expected) {
          button.classList.add("correct");
          currentStep++;

          if (currentStep === correctSequence.length) {
            locked = true;
            status.textContent = "You got it.";
          } else {
            status.textContent = "";
          }
        } else {
          locked = true;
          button.classList.add("wrong");
          status.textContent = "Wrong order.";
        }
      });
    });
  </script>
