<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minigame</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #05000a;
      color: #c084fc;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .wrap {
      max-width: 720px;
      width: 100%;
      padding: 40px 24px;
      background: rgba(10, 0, 20, 0.70);
      border: 1px solid rgba(192, 132, 252, 0.18);
      box-shadow: 0 0 22px rgba(192, 132, 252, 0.08);
      box-sizing: border-box;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .title {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .text {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .sequence {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .slot {
      width: 56px;
      height: 56px;
      border: 1px solid rgba(192, 132, 252, 0.20);
      background: rgba(192, 132, 252, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .slot.filled {
      border-color: rgba(192, 132, 252, 0.45);
      box-shadow: 0 0 12px rgba(192, 132, 252, 0.12);
      background: rgba(192, 132, 252, 0.05);
    }

    .slot img {
      width: 30px;
      height: 30px;
      opacity: 0.95;
      display: block;
    }

    .icon-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      margin-bottom: 28px;
      align-items: center;
      justify-items: center;
    }

    .icon-button {
      background: rgba(192, 132, 252, 0.06);
      border: 1px solid rgba(192, 132, 252, 0.35);
      padding: 18px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        opacity 0.2s ease,
        background 0.2s ease;
      opacity: 1;
    }

    .icon-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(192, 132, 252, 0.28);
      border-color: rgba(192, 132, 252, 0.7);
      background: rgba(192, 132, 252, 0.12);
    }

    .icon-button img {
      width: 64px;
      height: 64px;
      display: block;
      pointer-events: none;
    }

    .icon-button.selected {
      border-color: rgba(192, 132, 252, 0.55);
      box-shadow: 0 0 14px rgba(192, 132, 252, 0.18);
      background: rgba(192, 132, 252, 0.10);
      opacity: 0.4;
    }

    .icon-button:disabled {
      cursor: default;
    }

    .back {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(192, 132, 252, 0.25);
      color: rgba(192, 132, 252, 0.72);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.65;
      transition: opacity 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .back:hover {
      opacity: 1;
      border-color: rgba(192, 132, 252, 0.5);
      background: rgba(192, 132, 252, 0.08);
    }

    @media (max-width: 600px) {
      .wrap {
        padding: 32px 18px;
      }

      .icon-row {
        gap: 16px;
      }

      .icon-button {
        padding: 12px;
      }

      .icon-button img {
        width: 46px;
        height: 46px;
      }

      .slot {
        width: 46px;
        height: 46px;
      }

      .slot img {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap" id="gameWrap">
    <div class="title">Proceed</div>

    <div class="text">
      Some things only open in the order they were shown.
    </div>

    <div class="sequence">
      <div class="slot" id="slot0"></div>
      <div class="slot" id="slot1"></div>
      <div class="slot" id="slot2"></div>
      <div class="slot" id="slot3"></div>
    </div>

    <div class="icon-row">
      <button class="icon-button" data-symbol="puzzle">
        <img src="images/puzzle.svg" alt="Puzzle">
      </button>

      <button class="icon-button" data-symbol="eye">
        <img src="images/eye.svg" alt="Eye">
      </button>

      <button class="icon-button" data-symbol="star">
        <img src="images/star.svg" alt="Star">
      </button>

      <button class="icon-button" data-symbol="fire">
        <img src="images/fire.svg" alt="Fire">
      </button>
    </div>

    <a href="index.html" class="back">Back to Start</a>
  </div>

  <script>
    const correctSequence = ["eye", "fire", "puzzle", "star"];
    const playerSequence = [];

    const buttons = document.querySelectorAll(".icon-button");
    const slots = [
      document.getElementById("slot0"),
      document.getElementById("slot1"),
      document.getElementById("slot2"),
      document.getElementById("slot3")
    ];

    let locked = false;

    function updateSlots() {
      slots.forEach((slot, index) => {
        slot.innerHTML = "";
        slot.classList.remove("filled");

        if (playerSequence[index]) {
          const img = document.createElement("img");
          img.src = `images/${playerSequence[index]}.svg`;
          img.alt = playerSequence[index];
          slot.appendChild(img);
          slot.classList.add("filled");
        }
      });
    }

    function handleSuccess() {
      locked = true;
      window.location.href = "steam.html";
    }

    function handleFailure() {
      locked = true;
      window.location.href = "wubba.html";
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        if (locked) return;
        if (playerSequence.length >= 4) return;
        if (button.disabled) return;

        const chosen = button.dataset.symbol;
        playerSequence.push(chosen);

        button.classList.add("selected");
        button.disabled = true;

        updateSlots();

        if (playerSequence.length === 4) {
          const isCorrect = playerSequence.every(
            (value, index) => value === correctSequence[index]
          );

          if (isCorrect) {
            handleSuccess();
          } else {
            handleFailure();
          }
        }
      });
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
