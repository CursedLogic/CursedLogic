<body>
  <div class="wrap">
    <div class="quote" id="quote"></div>
    <div class="author"></div>
  </div>

  <script>
    const quotes = [
      {
        text: "How about if I sleep a little bit longer and forget all this nonsense? I have spent all my life resisting the desire to end it.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "I do not speak as I think. I do not think as I should, and so it all goes on in helpless darkness.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "I think we ought to read only the kind of books that wound or stab us. A book must be the axe for the frozen sea within us.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "A first sign of the beginning of understanding is the wish to die. The meaning of life is that it stops.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "I was ashamed when I realized life was a costume party and I attended with my real face.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "Start with what is right rather than what is acceptable.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "Don't edit your own soul.",
        author: "inspired by Franz Kafka"
      },
      {
        text: "Anyone who keeps the ability to see beauty never grows old.",
        author: "Franz Kafka"
      },
      {
        text: "I cannot make you understand. I cannot make anyone understand what is happening inside me. I cannot even explain it to myself.",
        author: "Franz Kafka"
      },
      {
        text: "People crave intimacy yet fear being truly seen, and so they settle for shallow connections, calling it love while dying quietly of loneliness.",
        author: "inspired by Franz Kafka / Fyodor Dostoyevsky"
      },
      {
        text: "Isolate as much as you want to become stronger, even if you see that loneliness is an unbearable hell. It is much better than the multiple masks of humans. Because in solitude, at least the pain is honest. There are no false smiles, no hidden intentions—just you and the truth you cannot escape.",
        author: "inspired by Fyodor Dostoyevsky"
      }
    ];

    const quoteEl = document.getElementById("quote");
    const authorEl = document.querySelector(".author");

    function setQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      quoteEl.textContent = quotes[randomIndex].text;
      authorEl.textContent = quotes[randomIndex].author;
    }

    setQuote();

    document.addEventListener("click", () => {
      setQuote();
    });
  </script>

</body>
</html>
